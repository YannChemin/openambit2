<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgC" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#0077e6"/>
      <stop offset="100%" stop-color="#003a8c"/>
    </radialGradient>
    <radialGradient id="screenC" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#001f5e"/>
      <stop offset="100%" stop-color="#000d2e"/>
    </radialGradient>
    <linearGradient id="bandC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a88ff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>
  </defs>
  <!-- Top band -->
  <rect x="24" y="1" width="16" height="11" rx="3" fill="url(#bandC)"/>
  <!-- Bottom band -->
  <rect x="24" y="52" width="16" height="11" rx="3" fill="url(#bandC)"/>
  <!-- Outer bezel -->
  <circle cx="32" cy="32" r="22" fill="url(#bgC)"/>
  <!-- Bezel edge highlight -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#66bbff" stroke-width="1" opacity="0.5"/>
  <!-- Crown button -->
  <rect x="53" y="27" width="4" height="10" rx="2" fill="#1a88ff"/>
  <!-- Screen -->
  <circle cx="32" cy="32" r="17" fill="url(#screenC)"/>
  <!-- GPS signal arcs - bright green -->
  <path d="M 32 36 m -6 0 a 6 6 0 0 1 12 0" fill="none" stroke="#00e87a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 32 36 m -10 0 a 10 10 0 0 1 20 0" fill="none" stroke="#00c85a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 32 36 m -14 0 a 14 14 0 0 1 28 0" fill="none" stroke="#009e44" stroke-width="2.2" stroke-linecap="round"/>
  <!-- GPS dot -->
  <circle cx="32" cy="36" r="2.5" fill="#00ff88"/>
  <!-- Checkmark - bold white + green -->
  <polyline points="22,28 28,35 42,20" fill="none" stroke="#00ff88" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tick marks -->
  <circle cx="32" cy="11.5" r="1.2" fill="#66bbff" opacity="0.7"/>
  <circle cx="52.5" cy="32" r="1.2" fill="#66bbff" opacity="0.7"/>
  <circle cx="32" cy="52.5" r="1.2" fill="#66bbff" opacity="0.7"/>
  <circle cx="11.5" cy="32" r="1.2" fill="#66bbff" opacity="0.7"/>
</svg>

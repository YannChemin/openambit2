<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgS" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff7b00"/>
      <stop offset="100%" stop-color="#b84000"/>
    </radialGradient>
    <radialGradient id="screenS" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3a1800"/>
      <stop offset="100%" stop-color="#1a0800"/>
    </radialGradient>
    <linearGradient id="bandS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </linearGradient>
    <linearGradient id="arrowS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdd00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
  </defs>
  <!-- Top band -->
  <rect x="24" y="1" width="16" height="11" rx="3" fill="url(#bandS)"/>
  <!-- Bottom band -->
  <rect x="24" y="52" width="16" height="11" rx="3" fill="url(#bandS)"/>
  <!-- Outer bezel -->
  <circle cx="32" cy="32" r="22" fill="url(#bgS)"/>
  <!-- Bezel edge highlight -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ffcc44" stroke-width="1" opacity="0.6"/>
  <!-- Motion speed lines on bezel -->
  <line x1="10.5" y1="22" x2="7" y2="20" stroke="#ffaa00" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="9"   y1="27" x2="5" y2="26" stroke="#ffaa00" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="9"   y1="32" x2="5" y2="32" stroke="#ffaa00" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <!-- Crown button -->
  <rect x="53" y="27" width="4" height="10" rx="2" fill="#ff9500"/>
  <!-- Screen -->
  <circle cx="32" cy="32" r="17" fill="url(#screenS)"/>
  <!-- Sync arrows - upper arc -->
  <path d="M 32 21 A 11 11 0 0 1 43 32" fill="none" stroke="url(#arrowS)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="32,17 26,23 38,23" fill="#ffdd00"/>
  <!-- Sync arrows - lower arc -->
  <path d="M 32 43 A 11 11 0 0 1 21 32" fill="none" stroke="url(#arrowS)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="32,47 38,41 26,41" fill="#ffdd00"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#ffcc00"/>
  <!-- Tick marks -->
  <circle cx="32" cy="11.5" r="1.2" fill="#ffcc44" opacity="0.7"/>
  <circle cx="52.5" cy="32" r="1.2" fill="#ffcc44" opacity="0.7"/>
  <circle cx="32" cy="52.5" r="1.2" fill="#ffcc44" opacity="0.7"/>
  <circle cx="11.5" cy="32" r="1.2" fill="#ffcc44" opacity="0.7"/>
</svg>

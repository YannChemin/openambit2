<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgD" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#1a1a26"/>
    </radialGradient>
    <radialGradient id="screenD" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a38"/>
      <stop offset="100%" stop-color="#16161f"/>
    </radialGradient>
  </defs>
  <!-- Top band -->
  <rect x="24" y="1" width="16" height="11" rx="3" fill="#555566"/>
  <!-- Bottom band -->
  <rect x="24" y="52" width="16" height="11" rx="3" fill="#555566"/>
  <!-- Outer bezel -->
  <circle cx="32" cy="32" r="22" fill="url(#bgD)" stroke="#888899" stroke-width="1.5"/>
  <!-- Bezel ring highlight -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#aaaacc" stroke-width="0.5" opacity="0.4"/>
  <!-- Crown button -->
  <rect x="53" y="27" width="4" height="10" rx="2" fill="#666677"/>
  <!-- Screen -->
  <circle cx="32" cy="32" r="17" fill="url(#screenD)"/>
  <!-- No-signal arc (greyed out GPS bars) -->
  <path d="M 32 32 m -10 0 a 10 10 0 0 1 20 0" fill="none" stroke="#444455" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 32 32 m -14 0 a 14 14 0 0 1 28 0" fill="none" stroke="#333344" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="2.5" fill="#555566"/>
  <!-- Red diagonal slash across signal -->
  <line x1="20" y1="20" x2="44" y2="44" stroke="#e8442a" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Tick mark dots on bezel (12, 3, 6, 9 o'clock) -->
  <circle cx="32" cy="11.5" r="1.2" fill="#aaaacc" opacity="0.5"/>
  <circle cx="52.5" cy="32" r="1.2" fill="#aaaacc" opacity="0.5"/>
  <circle cx="32" cy="52.5" r="1.2" fill="#aaaacc" opacity="0.5"/>
  <circle cx="11.5" cy="32" r="1.2" fill="#aaaacc" opacity="0.5"/>
</svg>
